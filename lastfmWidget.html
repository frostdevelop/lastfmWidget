<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last.fm Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&&family=DM+Sans:wght@200..700&display=swap" rel="stylesheet">
<style>
  * {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
  }
  
  :root {
	--main-font: "DM Sans", sans-serif;
	--bold-font: "Syne", sans-serif;
	--main-color: rgba(255, 255, 255, 0.95);
	--sub-color: rgba(255, 255, 255, 0.65);
	--dark-color: rgba(255, 255, 255, 0.25);
	--mute-color: rgba(255, 255, 255, 0.45);
	--pkt-bg: rgba(255, 255, 255, 0.025);
	--pkt-border: rgba(255, 255, 255, 0.15);
	--pkt-shadow: 0 20px 50px rgba(0, 0, 0, 1),
	  inset 0 1px 0 rgba(255, 255, 255, 0.25),
	  inset 0 10px 20px rgba(255, 255, 255, 0.05),
	  inset 0 -15px 30px rgba(0, 0, 0, 0.25);
	--pkt-filter: blur(2px) saturate(140%);
  }
  
  body {
	background: transparent;
	font-family: var(--main-font);
	width: 100vw;
	height: 100vh;
	overflow: hidden;
	position: relative;
	color: var(--main-color);
  }
  
  /* Config Screen */
  #config-panel {
	position: fixed;
	inset: 0;
	background-size: 10px 10px;
	background-image: radial-gradient(
	  circle,
	  rgba(255, 255, 255, 0.13) 1px,
	  transparent 1px
	);
	background-color: black;
	display: flex;
	z-index: 999;
	padding: 30px;
	overflow-y: auto;
	/*
			  align-items: safe center;
		  justify-content: center;
			  */
  }
  @keyframes text-breathe {
	0% {
	  text-shadow: 0 0 20px rgba(255, 255, 255, 1);
	}
	100% {
	  text-shadow: 0 0 50px rgba(255, 255, 255, 0.4);
	}
  }
  #config-panel::before {
	content: "<last.fm>";
	font-family: var(--bold-font);
	font-weight: 800;
	display: flex;
	align-items: center;
	justify-content: center;
	flex-direction: column;
	font-size: 15vmin;
	color: rgba(255, 255, 255, 0.2);
	text-shadow: 0 0 20px rgba(255, 255, 255, 1);
	mix-blend-mode: color-dodge;
	width: 100%;
	height: 100%;
	position: fixed;
	inset: 0;
	background: radial-gradient(
	  circle at 50% 0%,
	  rgba(0, 220, 255, 0.4),
	  transparent 70%
	);
	pointer-events: none;
	animation: text-breathe 3s infinite ease alternate;
  }
  #config-panel.hidden {
	display: none;
  }
  
  /* Config Element */
  .config-box {
	background: var(--pkt-bg);
	border: 1px solid var(--pkt-border);
	box-shadow: var(--pkt-shadow);
	backdrop-filter: var(--pkt-filter);
	border-radius: 10px;
	padding: 36px 40px;
	width: 600px;
	margin: auto;
  }
  
  .config-box h1 {
	font-family: var(--bold-font);
	font-size: 1.8rem;
	font-weight: 800;
	color: #fff;
  }
  
  .config-box a {
	text-decoration: none;
	color: #c4a8ff;
	font-weight: 800;
  }
  
  .config-footer {
	font-size: 0.7rem;
	margin-top: 20px;
	color: var(--dark-color);
  }
  
  .config-intro {
	font-size: 0.75rem;
	color: var(--mute-color);
	line-height: 1.6;
  }
  
  .config-section {
	font-size: 0.9rem;
	font-weight: 700;
	letter-spacing: 0.15rem;
	text-transform: uppercase;
	color: var(--sub-color);
	margin: 22px 0 12px;
	padding-bottom: 8px;
	border-bottom: 1px solid rgba(255, 255, 255, 0.15);
  }
  
  .config-row {
	margin-bottom: 14px;
  }
  
  .config-box label {
	display: block;
	font-size: 0.7rem;
	font-weight: 600;
	letter-spacing: 0.07rem;
	text-transform: uppercase;
	color: var(--mute-color);
	margin-bottom: 7px;
  }
  
  input[type="text"],
  input[type="number"],
  input[type="email"],
  input[type="password"],
  select,
  textarea,
  .toggle-row,
  .seg-btn,
  .align-btn,
  .toggle-track {
	width: 100%;
	background: var(--pkt-bg);
	border: 1px solid var(--pkt-border);
	border-radius: 60px;
	padding: 10px 16px;
	font-size: 0.8rem;
	color: var(--main-color);
	font-family: var(--main-font);
	outline: none;
	transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
	box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.4),
	  inset 0 -4px 10px rgba(0, 0, 0, 0.1);
  }
  
  input:focus,
  select:focus,
  textarea:focus,
  .radio-label input[type="radio"]:checked + .seg-btn,
  .align-label input[type="radio"]:checked + .align-btn {
	background: rgba(120, 80, 255, 0.25);
	border-color: currentcolor;
	color: #c4a8ff;
	box-shadow: 0 0 20px #c4a8ff99, inset 0 0 5px #c4a8ffee;
	/*
			  background: rgba(255, 255, 255, 0.08);
			  border-color: rgba(255, 255, 255, 0.4);
			  box-shadow: 
				  0 0 20px rgba(255, 255, 255, 0.2),
				  inset 0 0 5px rgba(255, 255, 255, 0.3);
			  */
  }
  ::placeholder {
	color: rgba(255, 255, 255, 0.18);
  }
  
  /* Toggle */
  .toggle-row {
	display: flex;
	align-items: center;
	justify-content: space-between;
	margin-bottom: 10px;
  }
  .toggle-label {
	font-size: 0.9rem;
	color: var(--mute-color);
  }
  .toggle {
	position: relative;
	display: flex !important;
	justify-content: center;
	flex-direction: column;
	cursor: pointer;
	box-sizing: content-box;
	margin: 0 !important;
	border-radius: 50px;
	width: fit-content;
	aspect-ratio: 2;
	height: 1.5rem;
	border: 1px solid var(--pkt-border);
  }
  .toggle-track {
	background: radial-gradient(
	  circle at 0% 50%,
	  rgba(255, 255, 255, 0.4),
	  transparent,
	  rgba(120, 80, 255, 0.8)
	);
	transition: background-position-x 0.2s;
	position: absolute;
	inset: 0;
	padding: 0;
	background-repeat: no-repeat;
	border: 0;
	background-size: 200%;
	background-position-x: 0%;
  }
  .toggle input:checked + .toggle-track {
	background-position-x: 100%;
  }
  .toggle input {
	appearance: none;
	position: absolute;
	aspect-ratio: 1;
	width: fit-content;
	border-radius: 50%;
	background: white;
	transform: scale(0.75);
	transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
	pointer-events: none;
	z-index: 1;
	height: 100%;
	box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
  }
  .toggle input:checked:active {
	/*aspect-ratio: 1 / 2;*/
	transform: translate(100%, 0) scaleY(0.75) scaleX(1);
  }
  .toggle input:active {
	transform: scaleY(0.75) scaleX(1);
  }
  .toggle input:checked {
	transform: translate(100%, 0) scale(0.75);
  }
  
  /* Size controls */
  .seg-group {
	display: flex;
	gap: 15px;
	flex-wrap: wrap;
  }
  .radio-label {
	flex: 1;
	cursor: pointer;
	display: block;
  }
  .radio-label input[type="radio"] {
	display: none;
  }
  .seg-btn {
	padding: 8px 20px;
	color: var(--sub-color);
	font-family: var(--main-font);
	font-size: 0.7rem;
	font-weight: 600;
	text-align: center;
	transition: all 0.18s;
	white-space: nowrap;
	text-transform: capitalize;
  }
  .seg-btn:hover,
  input:hover {
	border-color: rgba(255, 255, 255, 0.3);
	color: white;
  }
  /*
		  .seg-btn.active { 
			  background: rgba(120,80,255,0.25); 
			  border-color: currentcolor; 
			  color: #c4a8ff; 
			  box-shadow: 0 0 10px #c4a8ff99, inset 0 0 10px #c4a8ff88;
		  }
		  */
  
  /* Alignment grid */
  .align-grid {
	display: grid;
	grid-template-columns: repeat(3, 1fr);
	gap: 6px;
  }
  .align-label {
	cursor: pointer;
	display: block;
	margin: 0 !important;
  }
  .align-label input[type="radio"] {
	display: none;
  }
  .align-btn {
	aspect-ratio: 1.6;
	background: rgba(255, 255, 255, 0.04);
	border-radius: 5px;
	display: flex;
	align-items: center;
	justify-content: center;
	transition: all 0.15s;
	color: rgba(255, 255, 255, 0.15);
	border-color: currentcolor;
  }
  .align-btn:hover {
	color: rgba(255, 255, 255, 0.25);
  }
  .align-dot {
	width: 7px;
	height: 7px;
	border-radius: 50%;
	background: currentcolor;
	transition: background 0.18s;
  }
  
  /* URL preview */
  .url-preview-wrap {
	margin-top: 20px;
	background: rgba(255, 255, 255, 0.05);
	border: 1px solid rgba(255, 255, 255, 0.07);
	border-radius: 10px;
	padding: 12px 14px;
  }
  .url-preview-label {
	font-size: 10px;
	font-weight: 700;
	letter-spacing: 0.1em;
	text-transform: uppercase;
	color: var(--mute-color);
	margin-bottom: 6px;
  }
  #url-preview {
	font-family: monospace;
	font-size: 0.75rem;
	color: var(--dark-color);
	word-break: break-all;
	line-height: 1.5;
  }
  #url-preview span {
	color: rgba(120, 180, 255, 0.7);
  }
  
  .launch-btn {
	width: 100%;
	letter-spacing: 0.04em;
	cursor: pointer;
	margin-top: 22px;
	transition: opacity 0.2s, transform 0.15s;
	cursor: pointer;
	font-family: var(--bold-font);
	font-weight: 700;
	font-size: 1rem;
	letter-spacing: 0.02em;
	color: white;
	background: radial-gradient(
	  circle,
	  transparent 0%,
	  rgba(255, 255, 255, 0.2) 100%
	);
	border: 1px solid #ffffff;
	border-radius: 60px;
	padding: 18px;
	transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
	text-shadow: 0 0px 5px rgba(255, 255, 255, 0.5);
	box-shadow: 0 5px 25px rgba(255, 255, 255, 0.3),
	  inset 0 0px 15px rgba(255, 255, 255, 0.5);
	position: relative;
	overflow: hidden;
  }
  .launch-btn:hover {
	box-shadow: 0 7px 30px rgba(255, 255, 255, 0.2),
	  inset 0 0 8px rgba(255, 255, 255, 0.3);
	transform: translateY(-2px);
  }
  .launch-btn:active {
	transform: translateY(1px);
	box-shadow: 0 5px 15px rgba(255, 255, 255, 0.05);
  }
  .launch-btn::before {
	content: "";
	position: absolute;
	inset: 0;
	background: linear-gradient(
	  to right,
	  transparent,
	  rgba(255, 255, 255, 0.15),
	  transparent
	);
	transform: translateX(-100%);
	transition: transform 0.3s ease-out;
  }
  .launch-btn:hover::before {
	transform: translateX(100%);
  }
  
  #error-msg {
	font-size: 0.75rem;
	color: rgba(255, 100, 100, 0.85);
	margin-top: 12px;
	text-align: center;
	display: none;
	line-height: 1.5;
	opacity: 0;
	transition: opacity 0.3s linear;
  }
  
  #error-msg.visible {
	display: block;
	opacity: 1;
  }
  
  #aurora-container {
	position: fixed;
	inset: 0;
	pointer-events: none;
	z-index: 0;
	opacity: 0;
	transition: opacity 2s ease;
  }
  #aurora-container.visible {
	opacity: 1;
  }
  .orb {
	position: absolute;
	filter: blur(80px);
	opacity: 0.75;
	top: 0;
	left: 0;
  }
  .orb.top-left {
	transform: translate(0, 0);
  }
  .orb.top-right {
	transform: translate(-100%, 0);
  }
  .orb.bottom-right {
	transform: translate(-100%, -100%);
  }
  .orb.bottom-left {
	transform: translate(0, -100%);
  }
  .orb.top-center {
	transform: translate(-50%, 0);
  }
  .orb.bottom-center {
	transform: translate(-50%, -100%);
  }
  .orb.center-left {
	transform: translate(0, -50%);
  }
  .orb.center-right {
	transform: translate(-100%, -50%);
  }
  .orb.center {
	transform: translate(-50%, -50%);
  }
  .orb-1 {
	width: 500px;
	height: 500px;
  }
  .orb-1::before {
	content: "";
	width: 100%;
	height: 100%;
	display: block;
	border-radius: 50%;
	background: radial-gradient(circle, #7850ff, transparent 70%);
	animation: floatA 12s ease-in-out infinite;
  }
  .orb-2 {
	width: 400px;
	height: 400px;
  }
  .orb-2::before {
	content: "";
	width: 100%;
	height: 100%;
	display: block;
	border-radius: 50%;
	background: radial-gradient(circle, #ff50c8, transparent 70%);
	animation: floatB 15s ease-in-out infinite;
  }
  .orb-3 {
	width: 350px;
	height: 350px;
  }
  .orb-3::before {
	content: "";
	width: 100%;
	height: 100%;
	display: block;
	border-radius: 50%;
	background: radial-gradient(circle, #50d4ff, transparent 70%);
	animation: floatC 10s ease-in-out infinite;
  }
  
  @keyframes floatA {
	0%,
	100% {
	  transform: translate(0, 0) scale(1);
	}
	33% {
	  transform: translate(30px, -40px) scale(1.05);
	}
	66% {
	  transform: translate(-20px, -20px) scale(0.97);
	}
  }
  @keyframes floatB {
	0%,
	100% {
	  transform: translate(0, 0) scale(1);
	}
	50% {
	  transform: translate(-40px, -30px) scale(1.08);
	}
  }
  @keyframes floatC {
	0%,
	100% {
	  transform: translate(0, 0) scale(1);
	}
	40% {
	  transform: translate(20px, -50px) scale(1.03);
	}
	70% {
	  transform: translate(-10px, -20px) scale(0.95);
	}
  }
  
  @keyframes overlayFloat {
	0% {
	  transform: translateY(0) perspective(1000px) rotateY(20deg) rotatex(10deg);
	}
	100% {
	  transform: translateY(5px) perspective(1000px) rotateY(-20deg)
		rotatex(30deg);
	}
  }
  @keyframes overlayShimmer {
	0% {
	  transform: translateX(-400%);
	}
	100% {
	  transform: translateX(400%);
	}
  }
  #overlay {
	position: absolute;
	z-index: 10;
	display: flex;
	align-items: center;
	background: rgba(10, 8, 25, 0.45);
	backdrop-filter: blur(28px) saturate(1.8);
	-webkit-backdrop-filter: blur(28px) saturate(1.8);
	border: 1px solid rgba(255, 255, 255, 0.12);
	border-radius: 20px;
	box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.04) inset,
	  0 8px 40px rgba(0, 0, 0, 0.5), 0 0 80px rgba(120, 80, 255, 0.08);
	transform: translateY(0) perspective(1000px) rotateY(-15deg) rotatex(20deg);
	animation: overlayFloat 5s ease-in-out infinite alternate;
	overflow: hidden;
  }
  #overlay-container {
	position: fixed;
	inset: 0;
	opacity: 0;
	transform: translateY(20px);
	transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1),
	  transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  #overlay-container.visible {
	opacity: 1;
	transform: translateY(0);
  }
  #overlay::after {
	content: "";
	position: absolute;
	top: 0;
	left: 16px;
	right: 16px;
	height: 1px;
	background: linear-gradient(
	  90deg,
	  transparent,
	  rgba(255, 255, 255, 0.6),
	  transparent
	);
	border-radius: 1px;
	animation: shimmer 1.5s ease-in-out infinite alternate;
  }
  @keyframes shimmer {
	0% {
	  opacity: 0.3;
	  transform: scaleX(0.5);
	}
	100% {
	  opacity: 1;
	  transform: scaleX(1);
	}
  }
  #overlay::before {
	content: "";
	height: 100%;
	position: absolute;
	width: 100%;
	background: linear-gradient(
	  to right,
	  transparent 30%,
	  rgba(255, 255, 255, 0.3),
	  transparent 70%
	);
	top: 0;
	left: 0;
	animation: overlayShimmer 20s linear infinite;
	z-index: 10;
  }
  
  .album-wrap {
	position: relative;
	flex-shrink: 0;
  }
  @keyframes rotate {
	0% {
	  transform: rotate(0deg);
	}
	100% {
	  transform: rotate(360deg);
	}
  }
  #album-art {
	object-fit: cover;
	display: block;
	background: rgba(255, 255, 255, 0.06);
	position: relative;
	border: 2px solid #262626;
	box-shadow: 0 0 30px #00000087;
	animation: rotate 5s linear infinite;
	border-radius: 50%;
  }
  #album-art-large {
	position: absolute;
	transform: scale(2);
	opacity: 0.25;
	z-index: -2;
	left: 0;
	mask-image: linear-gradient(
	  to right,
	  rgba(0, 0, 0, 1) 50%,
	  rgba(0, 0, 0, 0) 100%
	);
	-webkit-mask-image: linear-gradient(
	  to right,
	  rgba(0, 0, 0, 1) 50%,
	  rgba(0, 0, 0, 0) 100%
	);
  }
  
  #album-shimmer {
	position: absolute;
	background: conic-gradient(
	  from 20deg at 50% 50%,
	  transparent 10%,
	  #fff 25%,
	  transparent 40%,
	  transparent 60%,
	  #fff 75%,
	  transparent 90%
	);
	z-index: 10;
	opacity: 0;
	transition: opacity 1s;
	/*mix-blend-mode: plus-lighter;*/
	border-radius: 50%;
	inset: 0;
  }
  #album-shimmer.visible {
	opacity: 0.4;
  }
  
  #album-aura {
	position: absolute;
	inset: 0;
	filter: blur(20px) brightness(2);
	z-index: -1;
  }
  
  .track-info {
	flex: 1;
	min-width: 0;
	display: flex;
	flex-direction: column;
	gap: 3px;
  }
  .now-playing-label {
	display: flex;
	align-items: center;
	gap: 6px;
	margin-bottom: 4px;
  }
  .pulse-dot {
	width: 6px;
	height: 6px;
	border-radius: 50%;
	background: #ff8cf3;
	animation: pulse 1.8s ease-in-out infinite alternate;
	flex-shrink: 0;
  }
  @keyframes pulse {
	0% {
	  opacity: 1;
	  transform: scale(1);
	}
	100% {
	  opacity: 0.4;
	  transform: scale(0.7);
	}
  }
  .now-playing-text {
	font-size: 10px;
	font-weight: 600;
	letter-spacing: 0.12em;
	text-transform: uppercase;
	color: #ffaef7cc;
  }
  #track-name {
	font-family: var(--bold-font);
	font-weight: 700;
	color: #fff;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	line-height: 0.75;
  }
  #track-name-large {
	position: absolute;
	font-size: 130px !important;
	left: 0;
	top: 0;
	line-height: 0.7;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	font-family: var(--bold-font);
	font-weight: 900;
	opacity: 0.3;
	text-transform: uppercase;
	background-clip: text;
	background: linear-gradient(white, transparent);
	-webkit-background-clip: text;
	color: transparent;
	z-index: -2;
  }
  #artist-name {
	font-weight: 300;
	color: rgba(255, 255, 255, 0.55);
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
  }
  #album-name {
	font-style: italic;
	color: rgba(255, 255, 255, 0.3);
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	margin-top: 2px;
  }
  
  .waveform {
	display: flex;
	align-items: center;
	gap: 3px;
	flex-shrink: 0;
  }
  .bar {
	width: 3px;
	border-radius: 2px;
	background: linear-gradient(to top, #ff36ea, white);
	box-shadow: 0 0 20px #ff36ea;
	animation: wave 1s ease-in-out infinite alternate;
  }
  .bar:nth-child(1) {
	animation-delay: 0s;
  }
  .bar:nth-child(2) {
	animation-delay: 0.15s;
  }
  .bar:nth-child(3) {
	animation-delay: 0.3s;
  }
  .bar:nth-child(4) {
	animation-delay: 0.45s;
  }
  .bar:nth-child(5) {
	animation-delay: 0.6s;
  }
  @keyframes wave {
	0% {
	  height: 6px;
	  opacity: 0.5;
	}
	100% {
	  height: 22px;
	  opacity: 1;
	}
  }
  /* Modal System */
  #modal-container {
	position: fixed;
	inset: 0;
	z-index: 9999;
	display: flex;
	align-items: center;
	justify-content: center;
	background: rgba(0, 0, 0, 0.5);
	opacity: 0;
	pointer-events: none;
	transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  #modal-container.visible {
	opacity: 1;
	pointer-events: auto;
  }
  
  #modal-box {
	background: var(--pkt-bg);
	border: 1px solid var(--pkt-border);
	box-shadow: var(--pkt-shadow);
	backdrop-filter: var(--pkt-filter);
	border-radius: 8px;
	padding: 25px 30px;
	width: 400px;
	max-width: 90%;
	text-align: center;
	transform: translateY(20px) scale(0.95);
	transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  #modal-container.visible #modal-box {
	transform: translateY(0) scale(1);
  }
  
  #modal-title {
	font-family: var(--bold-font);
	font-size: 1.4rem;
	font-weight: 800;
	color: #fff;
	margin-bottom: 12px;
  }
  
  #modal-message {
	font-size: 0.85rem;
	color: var(--mute-color);
	margin-bottom: 24px;
	line-height: 1.6;
  }
  
  #modal-box .launch-btn {
	margin-top: 0;
	padding: 14px;
	font-size: 0.9rem;
  }  
</style>
</head>
<body>
	<!-- <modal> is too annoying to style -->
	<div id="modal-container">
	<div id="modal-box">
		<h2 id="modal-title">Error</h2>
		<p id="modal-message"></p>
		<button class="launch-btn" onclick="hideModal()">Dismiss</button>
	</div>
	</div>
	<div id="aurora-container">
		<div class="orb orb-1"></div>
		<div class="orb orb-2"></div>
		<div class="orb orb-3"></div>
	</div>
	<div id="overlay-container">
	<div id="overlay">
	<img id="album-art-large" class="album-art" src="" alt="Album art" />
	  <div class="album-wrap">
		<div id="album-shimmer"></div>
		<img id="album-art" class="album-art" src="" alt="Album art" />
		<!-- Looks kinda weird, add as option later maybe? 
		 <img id="album-aura" class="album-art" src="" alt="Album art" /> 
		-->
	  </div>
	  <div class="track-info">
		<div class="now-playing-label">
		  <div class="pulse-dot"></div>
		  <span class="now-playing-text">Now Playing</span>
		</div>
		<div id="track-name" class="track-name">—</div>
		<div id="artist-name" class="artist-name">—</div>
		<div id="track-name-large" class="track-name"></div>
		<div id="album-name">-</div>
	  </div>
	  <div class="waveform" id="waveform">
		<div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
	  </div>
	</div>
</div>

<div id="config-panel">
  <div class="config-box">
    <h1>Last.fm Widget</h1>
    <p class="config-intro">Connect your Last.fm account, then add this page as a Browser Source.</p>

    <div class="config-section">Connection</div>

    <div class="config-row">
      <label>Last.fm Username</label>
      <input type="text" id="username-input" placeholder="your_lastfm_username" oninput="updateUrlPreview()" />
    </div>
    <div class="config-row">
		<label>Last.fm API Key <a href='https://last.fm/api/account/create' target='_blank'>(Get One)</a></label>
      <input type="password" id="apikey-input" placeholder="abcd1234" oninput="updateUrlPreview()" />
    </div>

    <div class="config-section">Appearance</div>

    <div class="toggle-row">
      <span class="toggle-label">Aurora glow behind widget</span>
      <label class="toggle">
        <input type="checkbox" id="glow-toggle" checked onchange="updateUrlPreview()" />
        <div class="toggle-track"></div>
      </label>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Spinning glow around album art</span>
      <label class="toggle">
				<input type="checkbox" id="albumglow-toggle" checked onchange="updateUrlPreview()"></input>
        <div class="toggle-track"></div>
      </label>
    </div>

    <div class="config-row" style="margin-top:14px;">
      <label>Widget Size</label>
      <form class="seg-group" id="size-group">
        <label class="radio-label">
          <input type="radio" name="size" value="sm">
          <div class="seg-btn">Small</div>
        </label>
        <label class="radio-label">
          <input type="radio" name="size" value="md" checked>
          <div class="seg-btn">Medium</div>
        </label>
        <label class="radio-label">
          <input type="radio" name="size" value="lg">
          <div class="seg-btn">Large</div>
        </label>
        <label class="radio-label">
          <input type="radio" name="size" value="xl">
          <div class="seg-btn">X-Large</div>
        </label>
      </form>
    </div>

    <div class="config-row" style="margin-top:14px;">
      <label>Position</label>
      <form class="align-grid" id="align-grid">
        <label class="align-label"><input type="radio" name="align" value="top-left"><div class="align-btn"><div class="align-dot"></div></div></label>
        <label class="align-label"><input type="radio" name="align" value="top-center"><div class="align-btn"><div class="align-dot"></div></div></label>
        <label class="align-label"><input type="radio" name="align" value="top-right"><div class="align-btn"><div class="align-dot"></div></div></label>
        <label class="align-label"><input type="radio" name="align" value="center-left"><div class="align-btn"><div class="align-dot"></div></div></label>
        <label class="align-label"><input type="radio" name="align" value="center"><div class="align-btn"><div class="align-dot"></div></div></label>
        <label class="align-label"><input type="radio" name="align" value="center-right"><div class="align-btn"><div class="align-dot"></div></div></label>
        <label class="align-label"><input type="radio" name="align" value="bottom-left" checked><div class="align-btn"><div class="align-dot"></div></div></label>
        <label class="align-label"><input type="radio" name="align" value="bottom-center"><div class="align-btn"><div class="align-dot"></div></div></label>
        <label class="align-label"><input type="radio" name="align" value="bottom-right"><div class="align-btn"><div class="align-dot"></div></div></label>
      </form>
    </div>

    <div class="config-row" style="margin-top:14px;">
      <label>Edge Padding (px)</label>
      <input type="number" id="padding-input" placeholder="32" value="32" oninput="updateUrlPreview()" />
    </div>

    <div class="url-preview-wrap">
      <div class="url-preview-label">Browser Source URL</div>
      <div id="url-preview">Fill in your details above to generate the URL.</div>
    </div>
    <button class="launch-btn" onclick="startOverlay()">Launch Overlay</button>
    <p id="error-msg"></p>

	<footer class="config-footer">v1.0-dev<br/>© Frostbyte 2026 | AGPL-3.0</footer>
  </div>
</div>

<script>
//these are a bit small lol
/*
	card: 260,
	art: 70,
	trackFs: 13,
	artistFs: 11,
	albumFs: 10,
	waveH: 18,
	waveMin: 5,
	gap: 5,
	pad: '11px 14px 11px 12px'
*/
const SIZES = {
	sm: {
		card: 360,
		art: 85,
		trackFs: 16,
		artistFs: 13,
		albumFs: 11,
		waveH: 24,
		waveMin: 6,
		gap: 10,
		pad: '15px 20px 15px 5px'
	},
	md: {
		card: 460,
		art: 100,
		trackFs: 19,
		artistFs: 15,
		albumFs: 12,
		waveH: 30,
		waveMin: 7,
		gap: 13,
		pad: '15px 20px 15px 10px'
	},
	lg: {
		card: 560,
		art: 125,
		trackFs: 23,
		artistFs: 17,
		albumFs: 13,
		waveH: 36,
		waveMin: 9,
		gap: 15,
		pad: '15px 25px 15px 13px'
	},
	xl: {
		card: 700,
		art: 155,
		trackFs: 35,
		artistFs: 22,
		albumFs: 14,
		waveH: 50,
		waveMin: 10,
		gap: 15,
		pad: '24px 28px 24px 15px'
	},
};
const POSITIONS = {
	'top-left': {
		v: 'top',
		h: 'left'
	},
	'top-center': {
		v: 'top',
		h: 'cx'
	},
	'top-right': {
		v: 'top',
		h: 'right'
	},
	'center-left': {
		v: 'cy',
		h: 'left'
	},
	'center': {
		v: 'cy',
		h: 'cx'
	},
	'center-right': {
		v: 'cy',
		h: 'right'
	},
	'bottom-left': {
		v: 'bottom',
		h: 'left'
	},
	'bottom-center': {
		v: 'bottom',
		h: 'cx'
	},
	'bottom-right': {
		v: 'bottom',
		h: 'right'
	},
};
const orbOffsets = {
	'top-left': {
		top: '-180px',
		left: '-100px',
		right: 'auto',
		bottom: 'auto'
	},
	'top-center': {
		top: '-180px',
		left: '50%',
		right: 'auto',
		bottom: 'auto'
	},
	'top-right': {
		top: '-180px',
		right: '-100px',
		left: 'auto',
		bottom: 'auto'
	},
	'center-left': {
		top: '50%',
		left: '-100px',
		right: 'auto',
		bottom: 'auto'
	},
	'center': {
		top: '50%',
		left: '50%',
		right: 'auto',
		bottom: 'auto'
	},
	'center-right': {
		top: '50%',
		right: '-100px',
		left: 'auto',
		bottom: 'auto'
	},
	'bottom-left': {
		bottom: '-180px',
		left: '-100px',
		right: 'auto',
		top: 'auto'
	},
	'bottom-center': {
		bottom: '-180px',
		left: '50%',
		right: 'auto',
		top: 'auto'
	},
	'bottom-right': {
		bottom: '-180px',
		right: '-100px',
		left: 'auto',
		top: 'auto'
	},
};

let cfg = {
	username: '',
	apiKey: '',
	glow: true,
	albumGlow: true,
	size: 'md',
	align: 'bottom-left',
	padding: 32
};
let pollInterval = null;
let lastTrackId = '';
const FALLBACK_ART = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72"%3E%3Crect width="72" height="72" rx="12" fill="%23ffffff10"/%3E%3Ccircle cx="36" cy="36" r="12" fill="%23ffffff15"/%3E%3Ccircle cx="36" cy="36" r="4" fill="%23ffffff25"/%3E%3C/svg%3E';

const alignGrid = document.getElementById('align-grid');
const sizeGroup = document.getElementById('size-group');
const usernameInput = document.getElementById('username-input');
const apikeyInput = document.getElementById('apikey-input');
const glowToggle = document.getElementById('glow-toggle');
const albumglowToggle = document.getElementById('albumglow-toggle');
const paddingInput = document.getElementById('padding-input');

const urlDisplay = document.getElementById('url-preview');
const errDisplay = document.getElementById('error-msg');

const configContainer = document.getElementById('config-panel');
const overlayContainer = document.getElementById('overlay-container');
const overlayElement = document.getElementById('overlay');

const overlayAlbumglow = document.getElementById('album-shimmer');
const overlayAlbumArts = document.getElementsByClassName('album-art');
const overlayWaveform = document.getElementById('waveform');
const overlayTrackNames = document.getElementsByClassName('track-name');
const overlayArtistNames = document.getElementsByClassName('artist-name');
const overlayAlbumName = document.getElementById('album-name');

const auroraContainer = document.getElementById('aurora-container');

const modalContainer = document.getElementById('modal-container');
const modalMessage = document.getElementById('modal-message');

const dynWave = document.createElement('style');
dynWave.id = 'dyn-wave';
document.head.appendChild(dynWave);

alignGrid.addEventListener('change', updateUrlPreview);
sizeGroup.addEventListener('change', updateUrlPreview);

function updateUrlPreview() {
	//May cause problems in the future, incorrect config format
	const url = new URL(window.location.href);
	cfg.username = usernameInput.value.trim();
	cfg.apiKey = apikeyInput.value.trim();
	cfg.glow = glowToggle.checked ? '1' : '0';
	cfg.albumGlow = albumglowToggle.checked ? '1' : '0';
	cfg.size = sizeGroup.elements['size'].value;
	cfg.align = alignGrid.elements['align'].value;
	cfg.padding = paddingInput.value.trim();

	cfg.username && url.searchParams.set('username', cfg.username);
	cfg.apiKey && url.searchParams.set('apikey', cfg.apiKey);
	url.searchParams.set('glow', cfg.glow);
	url.searchParams.set('albumglow', cfg.albumGlow);
	cfg.size && url.searchParams.set('size', cfg.size);
	cfg.align && url.searchParams.set('align', cfg.align);
	cfg.padding && url.searchParams.set('padding', cfg.padding);
	window.history.pushState({}, '', url);
	urlDisplay.innerHTML = `${url.href+url.pathname}?username=<span>${cfg.username || 'USERNAME'}</span>&amp;apikey=<span>${cfg.apiKey || 'API_KEY'}</span>&amp;glow=<span>${cfg.glow}</span>&amp;albumglow=<span>${cfg.albumGlow}</span>&amp;size=<span>${cfg.size}</span>&amp;align=<span>${cfg.align}</span>&amp;padding=<span>${cfg.padding || '32'}</span>`;
}

function applySettings() {
	const s = SIZES[cfg.size] || SIZES.md;
	const pos = POSITIONS[cfg.align] || POSITIONS['bottom-left'];
	const pad = cfg.padding;

	// Card
	overlayElement.style.maxWidth = s.card + 'px';
	overlayElement.style.minWidth = Math.round(s.card * 0.72) + 'px';
	overlayElement.style.padding = s.pad;
	overlayElement.style.gap = s.gap + 'px';

	// Art
	for (albumArt of overlayAlbumArts) {
		albumArt.style.width = s.art + 'px';
		albumArt.style.height = s.art + 'px';
	}

	// Text
	for (trackName of overlayTrackNames) trackName.style.fontSize = s.trackFs + 'px';
	for (artistName of overlayArtistNames) artistName.style.fontSize = s.artistFs + 'px';
	overlayAlbumName.style.fontSize = s.albumFs + 'px';

	overlayWaveform.style.height = s.waveH + 'px';
	dynWave.textContent = `@keyframes wave{0%,100%{height:${s.waveMin}px;opacity:.5}50%{height:${s.waveH}px;opacity:1}}`;

	overlayElement.style.top = '';
	overlayElement.style.bottom = '';
	overlayElement.style.left = '';
	overlayElement.style.right = '';
	//overlayElement.style.transform = '';

	const halfX = cfg.align.includes('center') && pos.h === 'cx';
	const halfY = pos.v === 'cy';

	if (pos.v === 'top') overlayElement.style.top = pad + 'px';
	if (pos.v === 'bottom') overlayElement.style.bottom = pad + 'px';
	if (pos.v === 'cy') overlayElement.style.top = '50%';

	if (pos.h === 'left') overlayElement.style.left = pad + 'px';
	if (pos.h === 'right') overlayElement.style.right = pad + 'px';
	if (pos.h === 'cx') overlayElement.style.left = '50%';

	/*
  	const tx = pos.h === 'cx' ? '-50%' : '0';
  	const ty = pos.v === 'cy' ? '-50%' : '0';
  	if(tx !== '0' || ty !== '0') overlayElement.style.transform = `translate(${tx}, ${ty})`;
	*/

	const align = cfg.align || 'bottom-left';
	const o = orbOffsets[align];
	if (cfg.glow) {
		auroraContainer.style.top = o.top || '';
		auroraContainer.style.bottom = o.bottom || '';
		auroraContainer.style.left = o.left || '';
		auroraContainer.style.right = o.right || '';
		for (orb of auroraContainer.children) orb.classList.add(align);
	}
}

function readUrlParams() {
	const p = new URLSearchParams(window.location.search);
	const u = p.get('username');
	const k = p.get('apikey');
	if (u) usernameInput.value = u;
	if (k) apikeyInput.value = k;

	if (p.has('glow')) glowToggle.checked = p.get('glow') !== '0';
	if (p.has('albumglow')) albumglowToggle.checked = p.get('albumglow') !== '0';

	const sz = p.get('size');
	if (sz && SIZES[sz]) {
		const r = sizeGroup.querySelector(`[value="${sz}"]`);
		if (r) r.checked = true;
	}
	const al = p.get('align');
	if (al && POSITIONS[al]) {
		const r = alignGrid.querySelector(`[value="${al}"]`);
		if (r) r.checked = true;
	}
	if (p.has('padding')) paddingInput.value = p.get('padding');

	if (u && k) startOverlay();
	else updateUrlPreview();
}

function startOverlay() {
	const u = usernameInput.value.trim();
	const k = apikeyInput.value.trim();

	if (!(u && k)) {
		showError('Please enter both your username and API key.');
		return;
	}

	cfg.username = u;
	cfg.apiKey = k;
	cfg.glow = glowToggle.checked;
	cfg.albumGlow = albumglowToggle.checked;
	cfg.size = sizeGroup.elements['size'].value;
	cfg.align = alignGrid.elements['align'].value;
	cfg.padding = parseInt(paddingInput.value) || 32;

	applySettings();
	configContainer.classList.add('hidden');
	pollInterval = setInterval(fetchNowPlaying, 15000);

	function handleConnectionChange() {
		if (!navigator.onLine) {
			showModal('You are offline!');
			pollInterval && clearInterval(pollInterval);
		} else {
			hideModal();
			fetchNowPlaying();
			if (!pollInterval) pollInterval = setInterval(fetchNowPlaying, 15000);
		}
	}

	window.addEventListener('offline', handleConnectionChange);
	window.addEventListener('online', handleConnectionChange);

	handleConnectionChange();
}

async function fetchNowPlaying() {
	try {
		const data = await (await fetch(`https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${encodeURIComponent(cfg.username)}&api_key=${encodeURIComponent(cfg.apiKey)}&format=json&limit=1`)).json();
		if (data.error) {
			showModal(data.message);
			return false;
		}

		hideModal();
		const tracks = data?.recenttracks?.track;
		if (!tracks || tracks.length === 0) {
			hideOverlay();
		}

		if (tracks[0]['@attr']?.nowplaying !== 'true') {
			hideOverlay();
		}

		if (tracks[0].url !== lastTrackId) {
			updateTrack(tracks[0]);
			lastTrackId = tracks[0].url;
		}
	} catch (e) {
		showModal('Network error: You may be offline or your API key and username may be wrong.');
	}
}

function updateTrack(track) {
	const images = track.image || [];
	let artUrl = '';
	for (let i = images.length - 1; i >= 0; i--) {
		if (images[i]['#text']) {
			artUrl = images[i]['#text'];
			break;
		}
	}
	overlayContainer.classList.remove('visible');
	setTimeout(() => {
		for (trackName of overlayTrackNames) trackName.textContent = track.name || 'Unknown Track';
		for (artistName of overlayArtistNames) artistName.textContent = track.artist?.['#text'] || 'Unknown Artist';
		overlayAlbumName.textContent = track.album?.['#text'] || '';
		if (artUrl) {
			const img = new Image();
			img.onload = () => {
				for (albumArt of overlayAlbumArts) albumArt.src = artUrl;
				showOverlay();
			};
			img.onerror = () => {
				for (albumArt of overlayAlbumArts) albumArt.src = FALLBACK_ART;
				showOverlay();
			};
			img.src = artUrl;
		} else {
			for (albumArt of overlayAlbumArts) albumArt.src = FALLBACK_ART;
			showOverlay();
		}
	}, 500);
}

function showOverlay() {
	overlayContainer.classList.add('visible');
	if (cfg.albumGlow) overlayAlbumglow.classList.add('visible');
	if (cfg.glow) auroraContainer.classList.add('visible');
}

function hideOverlay() {
	overlayContainer.classList.remove('visible');
	auroraContainer.classList.remove('visible');
	lastTrackId = '';
}

//only excecuted when in config
function showError(msg) {
	errDisplay.classList.add('visible');
	errDisplay.textContent = msg;
}

//only excecuted when out of config mode
function showModal(msg) {
	modalMessage.textContent = msg;
	modalContainer.classList.add('visible');
}

function hideModal() {
	modalContainer.classList.remove('visible');
}

if (document.readyState === 'complete') {
	readUrlParams();
} else {
	window.onload = readUrlParams;
}
</script>
</body>
</html>
